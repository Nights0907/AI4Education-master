# common request head
server.servlet.context-path=/api

server.port=8443
server.ssl.enabled=false
server.ssl.key-store=classpath:key.p12
server.ssl.key-store-password=${SSL_KEY_STORE_PASSWORD:123456}
server.ssl.keyStoreType=PKCS12

#datasource
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/education1?serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=${MYSQL_PASSWORD:123456}
spring.datasource.hikari.max-lifetime=500000

#Mybatis-Plus
spring.main.allow-bean-definition-overriding=true

#sa-token
sa-token.token-name=userToken
sa-token.timeout=2592000
sa-token.active-timeout=-1
sa-token.is-concurrent=false
sa-token.is-share=true
sa-token.token-style=uuid
sa-token.is-log=true
sa-token.cookie.sameSite=None
sa-token.cookie.secure=true

spring.http.multipart.enabled=true

#Mybatis-plus
mybatis-plus.configuration.map-underscore-to-camel-case=false

## MongoDB connection config
spring.data.mongodb.host=127.0.0.1
spring.data.mongodb.port=27017
spring.data.mongodb.database=my_db
